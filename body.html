<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Webpage</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background: #333;
            color: #fff;
            padding: 15px;
            text-align: center;
        }

        main {
            padding: 20px;
        }

        section {
            background: #fff;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 8px;
        }

        footer {
            background: #333;
            color: #fff;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>My Website</h1>
        <p>Welcome to my webpage</p>
    </header>

    <main>
        <section>
            <h2>Main Content</h2>
            <p>This is the main body of the webpage. You can put articles, text, images, or anything here.</p>
        </section>

        <section>
            <h2>Another Section</h2>
            <p>More content can go here. You can divide your page into multiple sections.</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 My Website</p>
    </footer>

</body>
</html>
